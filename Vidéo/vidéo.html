<!-- ── ANIMATIONS ENGINE ──────────────────────────────────────────────────── -->
<script type="text/babel">
const Easing = {
  linear:(t)=>t,
  easeInQuad:(t)=>t*t, easeOutQuad:(t)=>t*(2-t),
  easeInCubic:(t)=>t*t*t, easeOutCubic:(t)=>(--t)*t*t+1,
  easeInOutCubic:(t)=>t<0.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1,
  easeOutBack:(t)=>{ const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); },
  easeInBack:(t)=>{ const c1=1.70158,c3=c1+1; return c3*t*t*t-c1*t*t; },
  easeOutExpo:(t)=>t===1?1:1-Math.pow(2,-10*t),
};
const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
function interpolate(input,output,ease=Easing.linear){ return (t)=>{ if(t<=input[0])return output[0]; if(t>=input[input.length-1])return output[output.length-1]; for(let i=0;i<input.length-1;i++){if(t>=input[i]&&t<=input[i+1]){const span=input[i+1]-input[i];const local=span===0?0:(t-input[i])/span;const easeFn=Array.isArray(ease)?(ease[i]||Easing.linear):ease;return output[i]+(output[i+1]-output[i])*easeFn(local);}} return output[output.length-1]; }; }
function animate({from=0,to=1,start=0,end=1,ease=Easing.easeOutCubic}){ return (t)=>{ if(t<=start)return from; if(t>=end)return to; return from+(to-from)*ease((t-start)/(end-start)); }; }

const TimelineContext=React.createContext({time:0,duration:10,playing:false});
const useTime=()=>React.useContext(TimelineContext).time;
const useTimeline=()=>React.useContext(TimelineContext);
const SpriteContext=React.createContext({localTime:0,progress:0,duration:0});
const useSprite=()=>React.useContext(SpriteContext);

function Sprite({start=0,end=Infinity,children,keepMounted=false}){
  const {time}=useTimeline();
  const visible=time>=start&&time<=end;
  if(!visible&&!keepMounted)return null;
  const duration=end-start;
  const localTime=Math.max(0,time-start);
  const progress=duration>0&&isFinite(duration)?clamp(localTime/duration,0,1):0;
  const value={localTime,progress,duration,visible};
  return <SpriteContext.Provider value={value}>{typeof children==='function'?children(value):children}</SpriteContext.Provider>;
}

function IconButton({children,onClick,title}){
  const [hover,setHover]=React.useState(false);
  return <button onClick={onClick} title={title}
    onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
    style={{width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',
      background:hover?'rgba(216,189,118,0.22)':'rgba(216,189,118,0.08)',
      border:'1px solid rgba(216,189,118,0.28)',borderRadius:6,
      color:hover?'#d8bd76':'rgba(245,242,232,0.75)',cursor:'pointer',padding:0,transition:'background 120ms, color 120ms'}}
  >{children}</button>;
}

function PlaybackBar({time,duration,playing,onPlayPause,onReset,onSeek,onHover}){
  const trackRef=React.useRef(null);
  const [dragging,setDragging]=React.useState(false);
  const [isFs,setIsFs]=React.useState(false);

  const timeFromEvent=React.useCallback((e)=>{ const r=trackRef.current.getBoundingClientRect(); return clamp((e.clientX-r.left)/r.width,0,1)*duration; },[duration]);
  const onTrackMove=(e)=>{ if(!trackRef.current)return; const t=timeFromEvent(e); if(dragging)onSeek(t); else onHover(t); };
  const onTrackLeave=()=>{ if(!dragging)onHover(null); };
  const onTrackDown=(e)=>{ setDragging(true); onSeek(timeFromEvent(e)); onHover(null); };
  React.useEffect(()=>{ if(!dragging)return; const onUp=()=>setDragging(false); const onMove=(e)=>{ if(trackRef.current)onSeek(timeFromEvent(e)); }; window.addEventListener('mouseup',onUp); window.addEventListener('mousemove',onMove); return ()=>{ window.removeEventListener('mouseup',onUp); window.removeEventListener('mousemove',onMove); }; },[dragging,timeFromEvent,onSeek]);

  React.useEffect(()=>{
    const onFsChange=()=>setIsFs(!!document.fullscreenElement);
    document.addEventListener('fullscreenchange',onFsChange);
    return ()=>document.removeEventListener('fullscreenchange',onFsChange);
  },[]);

  const toggleFs=()=>{
    if(document.fullscreenElement){ document.exitFullscreen(); }
    else { (document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen).call(document.documentElement); }
  };

  const pct=duration>0?(time/duration)*100:0;
  const fmt=(t)=>{ const s=Math.floor(Math.max(0,t)%60); const m=Math.floor(Math.max(0,t)/60); const cs=Math.floor((Math.max(0,t)*100)%100); return `${m}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`; };
  const mono='JetBrains Mono,ui-monospace,monospace';
  return (
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'7px 14px',
      background:'rgba(14,53,49,0.98)',borderTop:'1px solid rgba(216,189,118,0.20)',
      width:'100%',color:'#f5f2e8',userSelect:'none',flexShrink:0}}>
      <IconButton onClick={onReset} title="Retour au début">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round" strokeLinecap="round"/></svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Lecture / Pause (espace)">
        {playing
          ? <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="3" y="2" width="3" height="10" fill="currentColor"/><rect x="8" y="2" width="3" height="10" fill="currentColor"/></svg>
          : <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 2l9 5-9 5V2z" fill="currentColor"/></svg>}
      </IconButton>
      <div style={{fontFamily:mono,fontSize:11,fontVariantNumeric:'tabular-nums',width:60,textAlign:'right',color:'rgba(245,242,232,0.9)'}}>{fmt(time)}</div>
      <div ref={trackRef} onMouseMove={onTrackMove} onMouseLeave={onTrackLeave} onMouseDown={onTrackDown}
        style={{flex:1,height:22,position:'relative',cursor:'pointer',display:'flex',alignItems:'center'}}>
        <div style={{position:'absolute',left:0,right:0,height:4,background:'rgba(255,255,255,0.12)',borderRadius:2}}/>
        <div style={{position:'absolute',left:0,width:`${pct}%`,height:4,background:'linear-gradient(90deg,#b8963e,#d8bd76)',borderRadius:2}}/>
        <div style={{position:'absolute',left:`${pct}%`,top:'50%',width:12,height:12,marginLeft:-6,marginTop:-6,
          background:'#d8bd76',borderRadius:6,boxShadow:'0 1px 4px rgba(14,53,49,0.5)'}}/>
      </div>
      <div style={{fontFamily:mono,fontSize:11,fontVariantNumeric:'tabular-nums',width:60,textAlign:'left',color:'rgba(245,242,232,0.4)'}}>{fmt(duration)}</div>

function Stage({width=1280,height=720,duration=10,background='#0e3531',loop=true,autoplay=true,persistKey='animstage',children}){
  const [time,setTime]=React.useState(()=>{ try{ const v=parseFloat(localStorage.getItem(persistKey+':t')||'0'); return isFinite(v)?clamp(v,0,duration):0; }catch{return 0;} });
  const [playing,setPlaying]=React.useState(autoplay);
  const [hoverTime,setHoverTime]=React.useState(null);
  const [scale,setScale]=React.useState(1);
  const stageRef=React.useRef(null);
  const rafRef=React.useRef(null);
  const lastTsRef=React.useRef(null);
  React.useEffect(()=>{ try{localStorage.setItem(persistKey+':t',String(time));}catch{} },[time,persistKey]);
  React.useEffect(()=>{ if(!stageRef.current)return; const el=stageRef.current; const measure=()=>{ const barH=46; const s=Math.min(el.clientWidth/width,(el.clientHeight-barH)/height); setScale(Math.max(0.05,s)); }; measure(); const ro=new ResizeObserver(measure); ro.observe(el); window.addEventListener('resize',measure); return()=>{ ro.disconnect(); window.removeEventListener('resize',measure); }; },[width,height]);
  React.useEffect(()=>{ if(!playing){lastTsRef.current=null;return;} const step=(ts)=>{ if(lastTsRef.current==null)lastTsRef.current=ts; const dt=(ts-lastTsRef.current)/1000; lastTsRef.current=ts; setTime(t=>{ let n=t+dt; if(n>=duration){if(loop)n=n%duration;else{n=duration;setPlaying(false);}} return n; }); rafRef.current=requestAnimationFrame(step); }; rafRef.current=requestAnimationFrame(step); return()=>{ if(rafRef.current)cancelAnimationFrame(rafRef.current); lastTsRef.current=null; }; },[playing,duration,loop]);
  React.useEffect(()=>{ const onKey=(e)=>{ if(e.target&&(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'))return; if(e.code==='Space'){e.preventDefault();setPlaying(p=>!p);} else if(e.code==='ArrowLeft')setTime(t=>clamp(t-(e.shiftKey?1:0.1),0,duration)); else if(e.code==='ArrowRight')setTime(t=>clamp(t+(e.shiftKey?1:0.1),0,duration)); else if(e.key==='0'||e.code==='Home')setTime(0); }; window.addEventListener('keydown',onKey); return()=>window.removeEventListener('keydown',onKey); },[duration]);
  const displayTime=hoverTime!=null?hoverTime:time;
  const ctxValue=React.useMemo(()=>({time:displayTime,duration,playing,setTime,setPlaying}),[displayTime,duration,playing]);
  return (
    <div ref={stageRef} style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',background:'#0e3531'}}>
      <div style={{flex:1,width:'100%',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',minHeight:0}}>
        <div style={{width,height,background,position:'relative',transform:`scale(${scale})`,transformOrigin:'center',flexShrink:0,overflow:'hidden'}}>
          <TimelineContext.Provider value={ctxValue}>{children}</TimelineContext.Provider>
        </div>
      </div>
      <PlaybackBar time={displayTime} actualTime={time} duration={duration} playing={playing}
        onPlayPause={()=>setPlaying(p=>!p)} onReset={()=>setTime(0)}
        onSeek={(t)=>setTime(t)} onHover={(t)=>setHoverTime(t)}/>
    </div>
  );
}

function Reveal({start,end,x,y,dy=20,dur=0.55,exit=0.4,origin='top left',center=false,children,style={}}){
  return <Sprite start={start} end={end}>{({localTime,duration})=>{
    const exitStart=duration-exit; let op=1,ty=0,sc=1;
    if(localTime<dur){const t=Easing.easeOutCubic(clamp(localTime/dur,0,1));op=t;ty=(1-t)*dy;sc=0.985+0.015*t;}
    else if(localTime>exitStart){const t=clamp((localTime-exitStart)/exit,0,1);op=1-t;ty=-t*12;}
    const pos=center?{left:0,right:0,textAlign:'center'}:{left:x};
    return <div style={{position:'absolute',top:y,opacity:op,transform:`translateY(${ty}px) scale(${sc})`,transformOrigin:center?'top center':origin,willChange:'transform,opacity',...pos,...style}}>{children}</div>;
  }}</Sprite>;
}

function Pop({start,end,x,y,dur=0.5,exit=0.35,center=false,children,style={}}){
  return <Sprite start={start} end={end}>{({localTime,duration})=>{
    const exitStart=duration-exit; let op=1,sc=1;
    if(localTime<dur){const t=clamp(localTime/dur,0,1);op=Easing.easeOutCubic(t);sc=Easing.easeOutBack(t)*0.4+0.6;}
    else if(localTime>exitStart){const t=clamp((localTime-exitStart)/exit,0,1);op=1-t;sc=1-0.1*t;}
    if(center)return <div style={{position:'absolute',left:0,right:0,top:y,opacity:op,display:'flex',justifyContent:'center',willChange:'transform,opacity'}}><div style={{transform:`scale(${sc})`,transformOrigin:'center',...style}}>{children}</div></div>;

  }}</Sprite>;
}

function Illo({src,x,y,w,h,start,end,radius=24,kb=true,entry=0.65,exit=0.5,rotate=0,style={}}){
  return <Sprite start={start} end={end}>{({localTime,duration})=>{
    const exitStart=duration-exit; let op=1,sc=1,ty=0;
    if(localTime<entry){const t=Easing.easeOutCubic(clamp(localTime/entry,0,1));op=t;sc=0.92+0.08*t;ty=(1-t)*26;}
    else if(localTime>exitStart){const t=clamp((localTime-exitStart)/exit,0,1);op=1-t;ty=-t*16;sc=1+0.02*t;}
    const holdSpan=Math.max(0.01,exitStart-entry);
    const holdT=clamp((localTime-entry)/holdSpan,0,1);
    const kbScale=kb?1+0.055*holdT:1;
    return <div style={{position:'absolute',left:x,top:y,width:w,height:h,opacity:op,transform:`translateY(${ty}px) rotate(${rotate}deg) scale(${sc})`,transformOrigin:'center',borderRadius:radius,overflow:'hidden',background:C.card,boxShadow:'0 30px 70px -24px rgba(14,53,49,0.5),0 2px 8px rgba(14,53,49,0.12)',border:`1px solid ${C.line}`,willChange:'transform,opacity',...style}}>

function ExampleCalc({start,end,s}){
  return <Sprite start={start} end={end}>{({localTime,duration})=>{
    const exit=0.5,exitStart=duration-exit; let op=1,ty=0;
    if(localTime<0.6){const t=Easing.easeOutCubic(clamp(localTime/0.6,0,1));op=t;ty=(1-t)*30;}
    else if(localTime>exitStart){const t=clamp((localTime-exitStart)/exit,0,1);op=1-t;ty=-t*14;}
    const cp=clamp((localTime-0.7)/2.0,0,1);
    const eased=Easing.easeOutCubic(cp);
    const sum=Math.round(eased*170);
    const barW=eased*100;
    return <div style={{position:'absolute',left:280,top:262,width:720,opacity:op,transform:`translateY(${ty}px)`}}>
      <div style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.14)',borderRadius:24,padding:'30px 36px'}}>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:22}}>
          <div style={{width:56,height:56,borderRadius:'50%',background:'rgba(216,189,118,0.18)',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="person-fill" size={28} color={C.goldHi}/></div>
